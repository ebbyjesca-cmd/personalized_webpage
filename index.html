<!DOCTYPE html>
<html lang="en">
<head>

    <title>Personalized webpage</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="script.js"></script>
    
</head>
<body>
    
    <div class="container">
            <h2>Personalized Webpage</h2>

            <!--form-->

                <input type="text" id="name" required>
                
                <br/>

                <br/>

               <button type="submit">Submit</button>

            </form>

            <hr>
            
            <h3 id="greetings"></h3>
            <p id="ageInMonths"></p>
            <p id="adultContent"></p>

            <div id="quotes"></div>

            </div>

    </div>
</body>
</html>
